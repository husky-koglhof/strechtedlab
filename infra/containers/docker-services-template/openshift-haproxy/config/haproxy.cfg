global
  log         127.0.0.1 local2
  maxconn     60000
  daemon

defaults
  mode                    http
  log                     global
  option                  dontlognull
  option                  http-server-close
  option                  redispatch
  retries                 3
  timeout http-request    10s
  timeout queue           1m
  timeout connect         10s
  timeout client          1m
  timeout server          1m
  timeout http-keep-alive 10s
  timeout check           10s
  maxconn                 60000

frontend stats
  bind *:1936
  mode            http
  log             global
  maxconn 10
  stats enable
  stats hide-version
  stats refresh 30s
  stats show-node
  stats show-desc Stats for OpenShift cluster
  stats auth admin:openshift
  stats uri /stats

listen api-server-6443
  bind *:6443
  mode tcp
  server bootstrap bootstrap.openshift.${domain_name}:6443 check inter 1s backup
  server master1 master1.openshift.${domain_name}:6443 check inter 1s
  server master2 master2.openshift.${domain_name}:6443 check inter 1s
  server master3 master3.openshift.${domain_name}:6443 check inter 1s
  server master4 master4.openshift.${domain_name}:6443 check inter 1s
  server master5 master5.openshift.${domain_name}:6443 check inter 1s


listen machine-config-server-22623
  bind *:22623
  mode tcp
  server bootstrap bootstrap.openshift.${domain_name}:22623 check inter 1s backup
  server master1 master1.openshift.${domain_name}:22623 check inter 1s
  server master2 master2.openshift.${domain_name}:22623 check inter 1s
  server master3 master3.openshift.${domain_name}:22623 check inter 1s
  server master4 master4.openshift.${domain_name}:22623 check inter 1s
  server master5 master5.openshift.${domain_name}:22623 check inter 1s

listen ingress-router-443
  bind *:443
  mode tcp
  balance source
  server worker1 worker1.openshift.${domain_name}:443 check inter 1s
  server worker2 worker2.openshift.${domain_name}:443 check inter 1s
  server worker3 worker3.openshift.${domain_name}:443 check inter 1s
  server worker4 worker4.openshift.${domain_name}:443 check inter 1s
  server worker5 worker5.openshift.${domain_name}:443 check inter 1s
  server worker6 worker6.openshift.${domain_name}:443 check inter 1s
  server worker7 worker7.openshift.${domain_name}:443 check inter 1s

listen ingress-router-80
  bind *:80
  mode tcp
  balance source
  server worker1 worker1.openshift.${domain_name}:80 check inter 1s
  server worker2 worker2.openshift.${domain_name}:80 check inter 1s
  server worker3 worker3.openshift.${domain_name}:80 check inter 1s
  server worker4 worker4.openshift.${domain_name}:80 check inter 1s
  server worker5 worker5.openshift.${domain_name}:80 check inter 1s
  server worker6 worker6.openshift.${domain_name}:80 check inter 1s
  server worker7 worker7.openshift.${domain_name}:80 check inter 1s
